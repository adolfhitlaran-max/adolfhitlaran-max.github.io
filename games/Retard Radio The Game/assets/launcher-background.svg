<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Barricade defense scene">
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#17234b"/>
      <stop offset="0.62" stop-color="#08101f"/>
      <stop offset="1" stop-color="#050711"/>
    </linearGradient>
    <linearGradient id="road" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#12182b"/>
      <stop offset="1" stop-color="#20283d"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#sky)"/>
  <circle cx="1270" cy="145" r="86" fill="#b8f3ff" opacity="0.18" filter="url(#glow)"/>

