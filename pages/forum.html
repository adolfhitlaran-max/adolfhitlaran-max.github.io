<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Supabase powered Uncensored Media forum for static GitHub Pages." />
  <title>Forum | Uncensored Media</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050607;
      --panel: rgba(15, 18, 20, 0.86);
      --text: #f5efe2;
      --muted: #b8b7ae;
      --line: rgba(245, 239, 226, 0.15);
      --red: #e5242a;
      --cyan: #00d5ff;
      --amber: #ffb83d;
      --green: #8fff6f;
      --radius: 8px;
      --max: 1240px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100svh;
      background:
        linear-gradient(130deg, rgba(229, 36, 42, 0.14), transparent 30rem),
        linear-gradient(300deg, rgba(0, 213, 255, 0.12), transparent 30rem),
        var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    a { color: inherit; text-decoration: none; }
    button, input, textarea { font: inherit; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      min-height: 4.5rem;
      border-bottom: 1px solid var(--line);
      padding: 0 max(1rem, calc((100vw - var(--max)) / 2));
      background: rgba(5, 6, 7, 0.84);
      backdrop-filter: blur(16px);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 0.7rem;
      font-weight: 950;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .brand-mark {
      width: 2rem;
      height: 2rem;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--red), rgba(0, 213, 255, 0.72));
      font-size: 0.76rem;
      font-weight: 950;
    }

    .nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 0.35rem;
    }

    .nav a {
      border: 1px solid transparent;
      border-radius: 999px;
      padding: 0.5rem 0.78rem;
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 850;
    }

    .nav a:hover,
    .nav a.active {
      border-color: var(--line);
      background: rgba(245, 239, 226, 0.08);
      color: white;
    }

    main {
      width: min(var(--max), calc(100% - 2rem));
      margin: 0 auto;
      padding: 4rem 0;
    }

    .hero {
      min-height: 20rem;
      display: grid;
      align-content: end;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: clamp(1rem, 3vw, 2rem);
      margin-bottom: 1rem;
      background:
        linear-gradient(90deg, rgba(5, 6, 7, 0.96), rgba(5, 6, 7, 0.56)),
        url("../assets/uncensored-media-hero.png") center / cover no-repeat;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.28);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      margin: 0 0 0.75rem;
      color: var(--amber);
      font-size: 0.78rem;
      font-weight: 950;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .eyebrow::before {
      content: "";
      width: 2.5rem;
      height: 2px;
      background: linear-gradient(90deg, var(--red), var(--cyan));
    }

    h1, h2, h3, p { margin-top: 0; }

    h1 {
      max-width: 10ch;
      margin-bottom: 1rem;
      font-size: clamp(3.5rem, 9vw, 7rem);
      line-height: 0.86;
      text-transform: uppercase;
    }

    .hero p {
      max-width: 44rem;
      margin-bottom: 0;
      color: rgba(245, 239, 226, 0.78);
      font-size: 1.05rem;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(20rem, 0.72fr) minmax(0, 1fr);
      gap: 1rem;
      align-items: start;
    }

    .panel,
    .post-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.22);
    }

    .panel {
      padding: 1rem;
    }

    .panel h2 {
      margin-bottom: 0.8rem;
      font-size: 1.65rem;
      line-height: 1;
      text-transform: uppercase;
    }

    .user-strip {
      display: grid;
      gap: 0.25rem;
      border: 1px solid rgba(245, 239, 226, 0.12);
      border-radius: var(--radius);
      padding: 0.85rem;
      margin-bottom: 1rem;
      background: rgba(5, 6, 7, 0.52);
    }

    .user-strip strong {
      color: white;
    }

    .user-strip span {
      color: var(--muted);
      overflow-wrap: anywhere;
    }

    form {
      display: grid;
      gap: 0.75rem;
    }

    label {
      display: grid;
      gap: 0.38rem;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 850;
      text-transform: uppercase;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid rgba(245, 239, 226, 0.16);
      border-radius: var(--radius);
      padding: 0.85rem;
      background: rgba(5, 6, 7, 0.68);
      color: var(--text);
      outline: none;
    }

    input { min-height: 3.1rem; }
    textarea { min-height: 10rem; resize: vertical; }

    input:focus,
    textarea:focus {
      border-color: rgba(0, 213, 255, 0.55);
    }

    button,
    .button {
      min-height: 3rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(245, 239, 226, 0.18);
      border-radius: 999px;
      padding: 0.75rem 1rem;
      background: rgba(245, 239, 226, 0.08);
      color: var(--text);
      font-weight: 950;
      cursor: pointer;
    }

    .primary {
      border-color: transparent;
      background: var(--text);
      color: var(--bg);
    }

    .notice {
      min-height: 3rem;
      border: 1px solid rgba(255, 184, 61, 0.32);
      border-radius: var(--radius);
      padding: 0.75rem;
      margin-bottom: 1rem;
      background: rgba(255, 184, 61, 0.08);
      color: rgba(245, 239, 226, 0.8);
      font-weight: 750;
    }

    .notice.ok {
      border-color: rgba(143, 255, 111, 0.38);
      background: rgba(143, 255, 111, 0.08);
    }

    .notice.error {
      border-color: rgba(229, 36, 42, 0.52);
      background: rgba(229, 36, 42, 0.1);
      color: #ffd8d8;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .toolbar h2 {
      margin: 0;
      font-size: 1.7rem;
      text-transform: uppercase;
    }

    .post-list {
      display: grid;
      gap: 0.8rem;
    }

    .post-card {
      padding: 1rem;
    }

    .post-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      margin-bottom: 0.7rem;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 850;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      border: 1px solid rgba(245, 239, 226, 0.13);
      border-radius: 999px;
      padding: 0.28rem 0.55rem;
      background: rgba(245, 239, 226, 0.06);
      color: var(--cyan);
      font-size: 0.72rem;
      font-weight: 950;
    }

    .post-card h3 {
      margin-bottom: 0.55rem;
      color: white;
      font-size: 1.25rem;
    }

    .post-card p {
      margin-bottom: 0;
      color: rgba(245, 239, 226, 0.78);
      white-space: pre-wrap;
    }

    .empty {
      border: 1px dashed rgba(245, 239, 226, 0.22);
      border-radius: var(--radius);
      padding: 1rem;
      color: var(--muted);
      background: rgba(245, 239, 226, 0.04);
    }

    @media (max-width: 860px) {
      .topbar,
      .workspace {
        display: grid;
        grid-template-columns: 1fr;
        align-items: stretch;
      }

      .nav {
        justify-content: start;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="../index.html">
      <span class="brand-mark">UM</span>
      <span>Uncensored Media</span>
    </a>
    <nav class="nav" aria-label="Primary">
      <a href="../Divided%20by%20Year/">Speeches</a>
      <a href="./pdfs.html">PDFs</a>
      <a class="active" href="./forum.html">Forum</a>
      <a href="./games.html">Games</a>
      <a href="./profile.html">Profile</a>
      <a href="./login.html" data-auth-link>Login</a>
    </nav>
  </header>

  <main>
    <section class="hero">
      <p class="eyebrow">Supabase Forum</p>
      <h1>Forum</h1>
      <p>Static GitHub Pages on the front, Supabase Auth and database behind the curtain.</p>
    </section>

    <div id="message" class="notice">Loading forum...</div>

    <section class="workspace">
      <aside class="panel">
        <p class="eyebrow">Post As</p>
        <div class="user-strip">
          <strong id="profileName">Signed out</strong>
          <span id="profileDetail">Log in and create a profile before posting.</span>
        </div>

        <h2>Create Post</h2>
        <form id="postForm">
          <label>Title <input id="postTitle" type="text" maxlength="120" required /></label>
          <label>Body <textarea id="postBody" maxlength="4000" required></textarea></label>
          <button class="primary" type="submit">Publish Post</button>
        </form>
      </aside>

      <section>
        <div class="toolbar">
          <h2>Latest Posts</h2>
          <button id="refreshBtn" type="button">Refresh</button>
        </div>
        <div id="postList" class="post-list" aria-live="polite"></div>
      </section>
    </section>
  </main>

  <script type="module">
    import {
      createPost,
      displayName,
      formatDate,
      getCurrentUserProfile,
      listPosts,
      supabase
    } from "../js/supabaseClient.js";

    const els = {
      message: document.getElementById("message"),
      profileName: document.getElementById("profileName"),
      profileDetail: document.getElementById("profileDetail"),
      postForm: document.getElementById("postForm"),
      postTitle: document.getElementById("postTitle"),
      postBody: document.getElementById("postBody"),
      postList: document.getElementById("postList"),
      refreshBtn: document.getElementById("refreshBtn")
    };

    let currentUser = null;
    let currentProfile = null;

    function setMessage(text, type = "") {
      els.message.textContent = text;
      els.message.className = `notice ${type}`.trim();
    }

    function setCreateProfileMessage(target, prefix) {
      const link = document.createElement("a");
      link.href = "./login.html";
      link.textContent = "Create your profile";
      link.style.textDecoration = "underline";
      link.style.fontWeight = "950";

      target.replaceChildren(
        document.createTextNode(`${prefix} `),
        link,
        document.createTextNode(".")
      );
    }

    function appendText(parent, text) {
      parent.appendChild(document.createTextNode(text || ""));
    }

    function renderPost(post) {
      const article = document.createElement("article");
      article.className = "post-card";

      const meta = document.createElement("div");
      meta.className = "post-meta";

      const author = document.createElement("span");
      author.className = "pill";
      appendText(author, `@${post.author?.username || "anonymous"}`);
      meta.appendChild(author);

      const display = document.createElement("span");
      appendText(display, displayName(post.author));
      meta.appendChild(display);

      const time = document.createElement("span");
      appendText(time, formatDate(post.created_at));
      meta.appendChild(time);

      const title = document.createElement("h3");
      appendText(title, post.title);

      const body = document.createElement("p");
      appendText(body, post.body);

      article.append(meta, title, body);
      return article;
    }

    async function refreshProfile() {
      const result = await getCurrentUserProfile();
      currentUser = result.user;
      currentProfile = result.profile;

      if (!currentUser) {
        currentProfile = null;
        els.profileName.textContent = "Signed out";
        els.profileDetail.textContent = "Log in and create a profile before posting.";
        els.postForm.querySelector("button").disabled = true;
        return;
      }

      if (!currentProfile?.username) {
        els.profileName.textContent = currentUser.email || "Logged in";
        setCreateProfileMessage(els.profileDetail, "No username yet.");
        els.postForm.querySelector("button").disabled = true;
        return;
      }

      els.profileName.textContent = displayName(currentProfile);
      els.profileDetail.textContent = `@${currentProfile.username}`;
      els.postForm.querySelector("button").disabled = false;
    }

    async function refreshPosts() {
      try {
        const posts = await listPosts();
        els.postList.replaceChildren();
        if (!posts.length) {
          const empty = document.createElement("div");
          empty.className = "empty";
          empty.textContent = "No posts yet. Start the first thread.";
          els.postList.appendChild(empty);
        } else {
          posts.forEach((post) => els.postList.appendChild(renderPost(post)));
        }
        setMessage("Forum synced.", "ok");
      } catch (error) {
        console.error("Forum posts load failed:", error);
        setMessage(error.message, "error");
      }
    }

    async function boot() {
      try {
        await refreshProfile();
        await refreshPosts();
      } catch (error) {
        console.error("Forum profile detection failed:", error);
        setMessage(error.message, "error");
      }
    }

    els.postForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      if (!currentProfile?.username) {
        setMessage("Create a username before posting.", "error");
        setCreateProfileMessage(els.message, "Create a username before posting.");
        return;
      }

      try {
        await createPost({
          title: els.postTitle.value,
          body: els.postBody.value
        });
        els.postForm.reset();
        setMessage("Post published.", "ok");
        await refreshPosts();
      } catch (error) {
        console.error("Forum post submit failed:", error);
        setMessage(error.message, "error");
      }
    });

    els.refreshBtn.addEventListener("click", refreshPosts);
    supabase.auth.onAuthStateChange(boot);
    boot();
  </script>
  <script src="../js/authNav.js"></script>
</body>
</html>
