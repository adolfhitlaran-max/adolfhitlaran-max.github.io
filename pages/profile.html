<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Uncensored Media user profile, profile editing, and recent activity." />
  <title>Profile | Uncensored Media</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050607;
      --panel: rgba(15, 18, 20, 0.86);
      --text: #f5efe2;
      --muted: #b8b7ae;
      --line: rgba(245, 239, 226, 0.15);
      --red: #e5242a;
      --cyan: #00d5ff;
      --amber: #ffb83d;
      --green: #8fff6f;
      --radius: 8px;
      --max: 1180px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100svh;
      background:
        linear-gradient(130deg, rgba(229, 36, 42, 0.16), transparent 32rem),
        linear-gradient(300deg, rgba(0, 213, 255, 0.13), transparent 30rem),
        var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    a { color: inherit; text-decoration: none; }
    button, input, textarea { font: inherit; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      min-height: 4.5rem;
      border-bottom: 1px solid var(--line);
      padding: 0 max(1rem, calc((100vw - var(--max)) / 2));
      background: rgba(5, 6, 7, 0.84);
      backdrop-filter: blur(16px);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 0.7rem;
      font-weight: 950;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .brand-mark {
      width: 2rem;
      height: 2rem;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--red), rgba(0, 213, 255, 0.72));
      font-size: 0.76rem;
      font-weight: 950;
    }

    .nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 0.35rem;
    }

    .nav a {
      border: 1px solid transparent;
      border-radius: 999px;
      padding: 0.5rem 0.78rem;
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 850;
    }

    .nav a:hover,
    .nav a.active {
      border-color: var(--line);
      background: rgba(245, 239, 226, 0.08);
      color: white;
    }

    main {
      width: min(var(--max), calc(100% - 2rem));
      margin: 0 auto;
      padding: 4rem 0;
    }

    .notice {
      min-height: 3rem;
      border: 1px solid rgba(255, 184, 61, 0.32);
      border-radius: var(--radius);
      padding: 0.75rem;
      margin-bottom: 1rem;
      background: rgba(255, 184, 61, 0.08);
      color: rgba(245, 239, 226, 0.86);
      font-weight: 750;
    }

    .notice.ok {
      border-color: rgba(143, 255, 111, 0.38);
      background: rgba(143, 255, 111, 0.08);
    }

    .notice.error {
      border-color: rgba(229, 36, 42, 0.52);
      background: rgba(229, 36, 42, 0.1);
      color: #ffd8d8;
    }

    .profile-shell {
      display: grid;
      grid-template-columns: minmax(18rem, 0.55fr) minmax(0, 1fr);
      gap: 1rem;
      align-items: start;
    }

    .panel,
    .profile-card,
    .activity-item {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.22);
    }

    .profile-card {
      overflow: hidden;
    }

    .profile-hero {
      min-height: 9rem;
      background:
        linear-gradient(90deg, rgba(5, 6, 7, 0.82), rgba(5, 6, 7, 0.2)),
        url("../assets/uncensored-media-hero.png") center / cover no-repeat;
    }

    .profile-body {
      padding: 1rem;
    }

    .avatar-row {
      display: flex;
      align-items: end;
      gap: 1rem;
      margin-top: -4rem;
      margin-bottom: 1rem;
    }

    .avatar,
    .avatar-fallback {
      width: 8rem;
      height: 8rem;
      border: 2px solid rgba(245, 239, 226, 0.25);
      border-radius: 50%;
      background: #111417;
      object-fit: cover;
      box-shadow: 0 20px 45px rgba(0,0,0,0.36);
    }

    .avatar-fallback {
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, rgba(229, 36, 42, 0.82), rgba(0, 213, 255, 0.68));
      color: white;
      font-size: 2rem;
      font-weight: 950;
    }

    h1, h2, h3, p { margin-top: 0; }

    h1 {
      margin-bottom: 0.2rem;
      font-size: clamp(2.4rem, 8vw, 5rem);
      line-height: 0.9;
      text-transform: uppercase;
    }

    .username {
      color: var(--amber);
      font-weight: 950;
      overflow-wrap: anywhere;
    }

    .muted {
      color: var(--muted);
    }

    .bio {
      margin: 1rem 0;
      color: rgba(245, 239, 226, 0.84);
      white-space: pre-wrap;
    }

    .panel {
      padding: 1rem;
    }

    .panel h2 {
      margin-bottom: 0.8rem;
      font-size: 1.55rem;
      text-transform: uppercase;
    }

    form {
      display: grid;
      gap: 0.75rem;
    }

    label {
      display: grid;
      gap: 0.38rem;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 850;
      text-transform: uppercase;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid rgba(245, 239, 226, 0.16);
      border-radius: var(--radius);
      padding: 0.85rem;
      background: rgba(5, 6, 7, 0.68);
      color: var(--text);
      outline: none;
    }

    textarea {
      min-height: 8rem;
      resize: vertical;
    }

    input:focus,
    textarea:focus {
      border-color: rgba(0, 213, 255, 0.55);
    }

    button,
    .button {
      min-height: 3rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(245, 239, 226, 0.18);
      border-radius: 999px;
      padding: 0.75rem 1rem;
      background: rgba(245, 239, 226, 0.08);
      color: var(--text);
      font-weight: 950;
      cursor: pointer;
    }

    .primary {
      border-color: transparent;
      background: var(--text);
      color: var(--bg);
    }

    .activity-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 1rem;
    }

    .activity-list {
      display: grid;
      gap: 0.65rem;
    }

    .activity-item {
      padding: 0.8rem;
      box-shadow: none;
    }

    .activity-item strong,
    .activity-item span {
      display: block;
    }

    .activity-item span,
    .activity-empty {
      color: var(--muted);
      font-size: 0.85rem;
    }

    .activity-item p {
      margin: 0.6rem 0 0;
      color: rgba(245, 239, 226, 0.82);
    }

    @media (max-width: 900px) {
      .topbar,
      .profile-shell,
      .activity-grid {
        display: grid;
        grid-template-columns: 1fr;
        align-items: stretch;
      }

      .nav {
        justify-content: start;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="../index.html">
      <span class="brand-mark">UM</span>
      <span>Uncensored Media</span>
    </a>
    <nav class="nav" aria-label="Primary">
      <a href="../Divided%20by%20Year/">Speeches</a>
      <a href="./pdfs.html">PDFs</a>
      <a href="./forum.html">Forum</a>
      <a href="./games.html">Games</a>
      <a class="active" href="./profile.html" data-auth-link>Profile</a>
    </nav>
  </header>

  <main>
    <div id="message" class="notice">Loading profile...</div>

    <section id="profileShell" class="profile-shell">
      <aside id="profileCard" class="profile-card">
        <div class="profile-hero"></div>
        <div class="profile-body">
          <div class="avatar-row">
            <img id="avatarImage" class="avatar" alt="" hidden />
            <div id="avatarFallback" class="avatar-fallback">UM</div>
          </div>
          <p id="profileUsername" class="username">@username</p>
          <h1 id="profileDisplayName">Profile</h1>
          <p id="profileJoined" class="muted">Joined date unavailable</p>
          <p id="profileBio" class="bio">No bio yet.</p>
          <p id="activitySummary" class="muted">Loading activity...</p>
        </div>
      </aside>

      <section>
        <div id="setupPanel" class="panel" hidden>
          <h2>Profile Setup</h2>
          <p>No profile exists yet.</p>
          <a class="button primary" href="./login.html">Create your profile</a>
        </div>

        <div id="editPanel" class="panel" hidden>
          <h2 id="editTitle">Edit Profile</h2>
          <form id="editForm">
            <label>Username <input id="editUsername" type="text" autocomplete="nickname" maxlength="24" required /></label>
            <label>Display Name <input id="editDisplayName" type="text" autocomplete="name" maxlength="48" /></label>
            <label>Avatar URL <input id="editAvatarUrl" type="url" placeholder="https://example.com/avatar.png" /></label>
            <label>Bio <textarea id="editBio" maxlength="500" placeholder="Write a short public bio."></textarea></label>
            <button class="primary" type="submit">Save Profile</button>
          </form>
        </div>
      </section>
    </section>

    <section class="panel" style="margin-top: 1rem;">
      <h2>Activity</h2>
      <div id="activityErrors"></div>
      <div class="activity-grid">
        <section>
          <h3>Forum Posts</h3>
          <div id="postsList" class="activity-list"></div>
        </section>
        <section>
          <h3>Comments</h3>
          <div id="commentsList" class="activity-list"></div>
        </section>
        <section>
          <h3>Game Scores</h3>
          <div id="scoresList" class="activity-list"></div>
        </section>
      </div>
    </section>
  </main>

  <script type="module" src="../js/supabaseClient.js"></script>
  <script type="module" src="../js/profile.js"></script>
  <script src="../js/authNav.js"></script>
</body>
</html>
