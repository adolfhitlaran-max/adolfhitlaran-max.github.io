<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Supabase powered game score leaderboard for Uncensored Media." />
  <title>Games | Uncensored Media</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050607;
      --panel: rgba(15, 18, 20, 0.86);
      --text: #f5efe2;
      --muted: #b8b7ae;
      --line: rgba(245, 239, 226, 0.15);
      --red: #e5242a;
      --cyan: #00d5ff;
      --amber: #ffb83d;
      --green: #8fff6f;
      --radius: 8px;
      --max: 1240px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100svh;
      background:
        linear-gradient(130deg, rgba(229, 36, 42, 0.14), transparent 30rem),
        linear-gradient(300deg, rgba(0, 213, 255, 0.12), transparent 30rem),
        var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    a { color: inherit; text-decoration: none; }
    button, input, select { font: inherit; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      min-height: 4.5rem;
      border-bottom: 1px solid var(--line);
      padding: 0 max(1rem, calc((100vw - var(--max)) / 2));
      background: rgba(5, 6, 7, 0.84);
      backdrop-filter: blur(16px);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 0.7rem;
      font-weight: 950;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .brand-mark {
      width: 2rem;
      height: 2rem;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--red), rgba(0, 213, 255, 0.72));
      font-size: 0.76rem;
      font-weight: 950;
    }

    .nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 0.35rem;
    }

    .nav a {
      border: 1px solid transparent;
      border-radius: 999px;
      padding: 0.5rem 0.78rem;
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 850;
    }

    .nav a:hover,
    .nav a.active {
      border-color: var(--line);
      background: rgba(245, 239, 226, 0.08);
      color: white;
    }

    main {
      width: min(var(--max), calc(100% - 2rem));
      margin: 0 auto;
      padding: 4rem 0;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(18rem, 0.52fr);
      gap: 1rem;
      align-items: stretch;
      margin-bottom: 1rem;
    }

    .hero-main,
    .stat-panel,
    .panel,
    .score-row {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.22);
    }

    .hero-main {
      min-height: 23rem;
      display: grid;
      align-content: end;
      padding: clamp(1rem, 3vw, 2rem);
      background:
        linear-gradient(90deg, rgba(5, 6, 7, 0.96), rgba(5, 6, 7, 0.56)),
        url("../assets/uncensored-media-hero.png") center / cover no-repeat;
    }

    .stat-panel {
      display: grid;
      align-content: space-between;
      gap: 1rem;
      padding: 1rem;
    }

    .stat-box {
      border: 1px solid rgba(245, 239, 226, 0.12);
      border-radius: var(--radius);
      padding: 1rem;
      background: rgba(5, 6, 7, 0.52);
    }

    .stat-box strong {
      display: block;
      color: white;
      font-size: 2.35rem;
      line-height: 1;
    }

    .stat-box span {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 850;
      text-transform: uppercase;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      margin: 0 0 0.75rem;
      color: var(--amber);
      font-size: 0.78rem;
      font-weight: 950;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .eyebrow::before {
      content: "";
      width: 2.5rem;
      height: 2px;
      background: linear-gradient(90deg, var(--red), var(--cyan));
    }

    h1, h2, h3, p { margin-top: 0; }

    h1 {
      max-width: 10ch;
      margin-bottom: 1rem;
      font-size: clamp(3.5rem, 9vw, 7rem);
      line-height: 0.86;
      text-transform: uppercase;
    }

    .hero-main p {
      max-width: 44rem;
      margin-bottom: 0;
      color: rgba(245, 239, 226, 0.78);
      font-size: 1.05rem;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(20rem, 0.7fr) minmax(0, 1fr);
      gap: 1rem;
      align-items: start;
    }

    .panel {
      padding: 1rem;
    }

    .panel h2 {
      margin-bottom: 0.8rem;
      font-size: 1.65rem;
      line-height: 1;
      text-transform: uppercase;
    }

    form {
      display: grid;
      gap: 0.75rem;
    }

    label {
      display: grid;
      gap: 0.38rem;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 850;
      text-transform: uppercase;
    }

    input,
    select {
      width: 100%;
      min-height: 3.1rem;
      border: 1px solid rgba(245, 239, 226, 0.16);
      border-radius: var(--radius);
      padding: 0 0.85rem;
      background: rgba(5, 6, 7, 0.68);
      color: var(--text);
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: rgba(0, 213, 255, 0.55);
    }

    button,
    .button {
      min-height: 3rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(245, 239, 226, 0.18);
      border-radius: 999px;
      padding: 0.75rem 1rem;
      background: rgba(245, 239, 226, 0.08);
      color: var(--text);
      font-weight: 950;
      cursor: pointer;
    }

    .primary {
      border-color: transparent;
      background: var(--text);
      color: var(--bg);
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
    }

    .notice {
      min-height: 3rem;
      border: 1px solid rgba(255, 184, 61, 0.32);
      border-radius: var(--radius);
      padding: 0.75rem;
      margin-bottom: 1rem;
      background: rgba(255, 184, 61, 0.08);
      color: rgba(245, 239, 226, 0.8);
      font-weight: 750;
    }

    .notice.ok {
      border-color: rgba(143, 255, 111, 0.38);
      background: rgba(143, 255, 111, 0.08);
    }

    .notice.error {
      border-color: rgba(229, 36, 42, 0.52);
      background: rgba(229, 36, 42, 0.1);
      color: #ffd8d8;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .toolbar h2 {
      margin: 0;
      font-size: 1.7rem;
      text-transform: uppercase;
    }

    .leaderboard {
      display: grid;
      gap: 0.65rem;
    }

    .score-row {
      display: grid;
      grid-template-columns: 3rem minmax(0, 1fr) auto;
      gap: 0.8rem;
      align-items: center;
      padding: 0.85rem;
    }

    .rank {
      width: 2.4rem;
      height: 2.4rem;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255, 184, 61, 0.35);
      border-radius: 50%;
      color: var(--amber);
      font-weight: 950;
    }

    .score-main {
      display: grid;
      gap: 0.15rem;
      min-width: 0;
    }

    .score-main strong {
      color: white;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .score-main span {
      color: var(--muted);
      font-size: 0.82rem;
    }

    .score-value {
      color: var(--green);
      font-size: 1.45rem;
      font-weight: 950;
      white-space: nowrap;
    }

    .empty {
      border: 1px dashed rgba(245, 239, 226, 0.22);
      border-radius: var(--radius);
      padding: 1rem;
      color: var(--muted);
      background: rgba(245, 239, 226, 0.04);
    }

    @media (max-width: 860px) {
      .topbar,
      .hero,
      .workspace {
        display: grid;
        grid-template-columns: 1fr;
        align-items: stretch;
      }

      .nav {
        justify-content: start;
      }
    }

    @media (max-width: 520px) {
      .score-row {
        grid-template-columns: 2.5rem minmax(0, 1fr);
      }

      .score-value {
        grid-column: 2;
        font-size: 1.2rem;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="../index.html">
      <span class="brand-mark">UM</span>
      <span>Uncensored Media</span>
    </a>
    <nav class="nav" aria-label="Primary">
      <a href="../Divided%20by%20Year/">Speeches</a>
      <a href="./pdfs.html">PDFs</a>
      <a href="./forum.html">Forum</a>
      <a class="active" href="./games.html">Games</a>
      <a href="./login.html" data-auth-link>Login</a>
    </nav>
  </header>

  <main>
    <section class="hero">
      <div class="hero-main">
        <p class="eyebrow">Supabase Scores</p>
        <h1>Games</h1>
        <p>Submit scores from the static site and keep a live leaderboard sorted from highest to lowest.</p>
      </div>
      <aside class="stat-panel">
        <div class="stat-box">
          <strong id="topScore">0</strong>
          <span>Top Score</span>
        </div>
        <div class="stat-box">
          <strong id="scoreCount">0</strong>
          <span>Scores Listed</span>
        </div>
        <a class="button primary" href="../games/">Launch Game Hub</a>
      </aside>
    </section>

    <div id="message" class="notice">Loading leaderboard...</div>

    <section class="workspace">
      <aside class="panel">
        <p class="eyebrow">Score Submit</p>
        <h2>Post Score</h2>
        <form id="scoreForm">
          <label>Game
            <select id="gameName">
              <option value="Uncensored Arcade">Uncensored Arcade</option>
              <option value="Hold the Line">Hold the Line</option>
              <option value="Campaign Run">Campaign Run</option>
              <option value="Community Challenge">Community Challenge</option>
            </select>
          </label>
          <label>Score <input id="scoreValue" type="number" min="0" step="1" required /></label>
          <button class="primary" type="submit">Submit Score</button>
        </form>
        <div class="button-row" style="margin-top: 0.8rem;">
          <a class="button" href="./login.html">Profile</a>
          <a class="button" href="../games/">Play Games</a>
        </div>
      </aside>

      <section>
        <div class="toolbar">
          <h2>Leaderboard</h2>
          <label style="min-width: 12rem;">Filter
            <select id="filterGame">
              <option value="all">All Games</option>
              <option value="Uncensored Arcade">Uncensored Arcade</option>
              <option value="Hold the Line">Hold the Line</option>
              <option value="Campaign Run">Campaign Run</option>
              <option value="Community Challenge">Community Challenge</option>
            </select>
          </label>
        </div>
        <div id="leaderboard" class="leaderboard" aria-live="polite"></div>
      </section>
    </section>
  </main>

  <script type="module">
    import {
      displayName,
      formatDate,
      getCurrentUserProfile,
      listScores,
      submitScore,
      supabase
    } from "../js/supabaseClient.js";

    const els = {
      message: document.getElementById("message"),
      topScore: document.getElementById("topScore"),
      scoreCount: document.getElementById("scoreCount"),
      scoreForm: document.getElementById("scoreForm"),
      gameName: document.getElementById("gameName"),
      scoreValue: document.getElementById("scoreValue"),
      filterGame: document.getElementById("filterGame"),
      leaderboard: document.getElementById("leaderboard")
    };

    let currentUser = null;
    let currentProfile = null;
    let leaderboardError = false;

    function setMessage(text, type = "") {
      els.message.textContent = text;
      els.message.className = `notice ${type}`.trim();
    }

    function setCreateProfileMessage(prefix) {
      const link = document.createElement("a");
      link.href = "./login.html";
      link.textContent = "Create your profile";
      link.style.textDecoration = "underline";
      link.style.fontWeight = "950";

      els.message.replaceChildren(
        document.createTextNode(`${prefix} `),
        link,
        document.createTextNode(".")
      );
      els.message.className = "notice error";
    }

    function appendText(parent, text) {
      parent.appendChild(document.createTextNode(text || ""));
    }

    function withTimeout(promise, ms, message) {
      let timeoutId;
      const timeout = new Promise((_, reject) => {
        timeoutId = window.setTimeout(() => reject(new Error(message)), ms);
      });

      return Promise.race([promise, timeout]).finally(() => {
        window.clearTimeout(timeoutId);
      });
    }

    function renderEmptyLeaderboard(text, isError = false) {
      els.leaderboard.replaceChildren();
      els.scoreCount.textContent = "0";
      els.topScore.textContent = "0";

      const empty = document.createElement("div");
      empty.className = isError ? "empty notice error" : "empty";
      empty.textContent = text;
      els.leaderboard.appendChild(empty);
    }

    function renderScore(row, index) {
      const card = document.createElement("article");
      card.className = "score-row";

      const rank = document.createElement("div");
      rank.className = "rank";
      appendText(rank, String(index + 1));

      const main = document.createElement("div");
      main.className = "score-main";

      const name = document.createElement("strong");
      appendText(name, `@${row.author?.username || "anonymous"} - ${displayName(row.author)}`);

      const meta = document.createElement("span");
      appendText(meta, `${row.game} / ${formatDate(row.created_at)}`);
      main.append(name, meta);

      const value = document.createElement("div");
      value.className = "score-value";
      appendText(value, Number(row.score || 0).toLocaleString());

      card.append(rank, main, value);
      return card;
    }

    async function refreshProfile() {
      try {
        const result = await withTimeout(
          getCurrentUserProfile(),
          10000,
          "Profile query timed out."
        );
        currentUser = result.user;
        currentProfile = result.profile;
        els.scoreForm.querySelector("button").disabled = !currentProfile?.username;

        if (leaderboardError) return;

        if (!currentUser) {
          setMessage("Log in before submitting scores. The leaderboard is still public.", "");
        } else if (!currentProfile?.username) {
          setCreateProfileMessage("Create a username before submitting scores.");
        } else {
          setMessage("Profile loaded. You can submit scores.", "ok");
        }
      } catch (error) {
        console.error("Score profile detection failed:", error);
        currentUser = null;
        currentProfile = null;
        els.scoreForm.querySelector("button").disabled = true;
        if (!leaderboardError) setMessage(`Profile load failed: ${error.message}`, "error");
      }
    }

    async function refreshScores() {
      setMessage("Loading leaderboard...", "");
      try {
        const scores = await withTimeout(
          listScores(els.filterGame.value),
          15000,
          "Leaderboard query timed out while reading public.game_scores."
        );
        leaderboardError = false;
        els.leaderboard.replaceChildren();
        els.scoreCount.textContent = scores.length;
        els.topScore.textContent = scores[0]?.score ? Number(scores[0].score).toLocaleString() : "0";

        if (!scores.length) {
          renderEmptyLeaderboard("No scores yet.");
          setMessage(currentProfile?.username ? "No scores yet. Submit the first run." : "No scores yet.", "");
          return;
        } else {
          scores.forEach((score, index) => els.leaderboard.appendChild(renderScore(score, index)));
        }

        if (currentProfile?.username) {
          setMessage("Leaderboard synced. You are ready to submit scores.", "ok");
        } else if (currentUser) {
          setCreateProfileMessage("Leaderboard loaded. Create a username before submitting scores.");
        } else {
          setMessage("Leaderboard loaded. Log in before submitting scores.", "");
        }
      } catch (error) {
        leaderboardError = true;
        console.error("Leaderboard load failed:", error);
        const message = error?.message || "Leaderboard query failed.";
        setMessage(message, "error");
        renderEmptyLeaderboard(message, true);
      }
    }

    async function boot() {
      await refreshScores();
      await refreshProfile();
    }

    els.scoreForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      if (!currentProfile?.username) {
        setCreateProfileMessage("Create a username before submitting scores.");
        return;
      }

      try {
        await submitScore({
          game: els.gameName.value,
          score: els.scoreValue.value
        });
        els.scoreForm.reset();
        setMessage("Score submitted.", "ok");
        await refreshScores();
      } catch (error) {
        console.error("Score submit failed:", error);
        setMessage(error.message, "error");
      }
    });

    els.filterGame.addEventListener("change", refreshScores);
    supabase.auth.onAuthStateChange(boot);
    boot();
  </script>
  <script src="../js/authNav.js"></script>
</body>
</html>
